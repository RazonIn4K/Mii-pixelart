# Cloudflare configuration for Living The Grid Studio.
#
# Cloudflare Pages does NOT strictly require this file — the Pages dashboard
# stores build settings and environment variables for you. We keep this file
# checked in so that:
#   1. `wrangler pages dev` can run Pages Functions locally.
#   2. `wrangler pages deploy dist/public` works from CI without UI clicks.
#   3. The Pages project's compatibility settings are version-controlled.
#
# Apply with: `wrangler pages project create tomodachi-studio` once, then
# `wrangler pages deploy dist/public --project-name=tomodachi-studio`.

name = "tomodachi-studio"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist/public"

# Functions directory is auto-discovered at ./functions.
# Secrets (OPENROUTER_API_KEY, STRIPE_SECRET_KEY, etc.) MUST be set via:
#   wrangler pages secret put OPENROUTER_API_KEY --project-name=tomodachi-studio
# or via the Pages dashboard. Do not commit secret values to this file.

[vars]
PUBLIC_SITE_URL = "https://tomodachi.pw"

[env.preview.vars]
PUBLIC_SITE_URL = "https://preview.tomodachi.pw"

# KV namespace for edge caching (OpenRouter models list, rate-limit counters,
# Brave Rewards verification token, etc.).
# Namespace: tomodachi-edge-cache
# Account:   d45bbb1a6d3f779af15c93a9f2603bc9 (Davidinfosec07@gmail.com)
#
# NOTE: This binding takes effect for `wrangler pages deploy` CLI runs.
# For Git-triggered Cloudflare Pages builds you ALSO need to add the binding
# manually in Pages → Settings → Functions → KV namespace bindings:
#   Variable name: EDGE_CACHE
#   KV namespace:  tomodachi-edge-cache (5129b5ce8d2d435cb704b398a437f355)
[[kv_namespaces]]
binding = "EDGE_CACHE"
id = "5129b5ce8d2d435cb704b398a437f355"
