<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Tomodachi · Mii Studio &amp; Recovery Guides</title>
    <meta
      name="description"
      content="Tomodachi is a Mii pixel-art studio paired with practical breach-recovery guides. Sketch, critique, and ship; or pick up the recovery checklist and consult."
    />
    <meta name="theme-color" content="#101016" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://tomodachi.pw/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tomodachi" />
    <meta
      property="og:title"
      content="Tomodachi · Mii Studio &amp; Recovery Guides"
    />
    <meta
      property="og:description"
      content="A Mii pixel-art studio paired with practical breach-recovery guides. Sketch, critique, and ship; or pick up the recovery checklist and consult."
    />
    <meta property="og:url" content="https://tomodachi.pw/" />
    <meta property="og:image" content="https://tomodachi.pw/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Tomodachi · Mii Studio and Recovery Guides"
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Tomodachi · Mii Studio &amp; Recovery Guides"
    />
    <meta
      name="twitter:description"
      content="A Mii pixel-art studio paired with practical breach-recovery guides."
    />
    <meta name="twitter:image" content="https://tomodachi.pw/og-image.png" />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='4' fill='%23d94f4f'/%3E%3C/svg%3E"
    />
    <!-- PWA: makes the site installable on Android/iOS home screens.
         Brand color matches the studio header; background_color matches the
         Paper Studio off-white surface. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/og-image.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tomodachi" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the LCP hero image so the browser kicks off the fetch before
         it finishes parsing the JS bundle. Image is now served from the same
         origin so no preconnect hint is needed. -->
    <link
      rel="preload"
      as="image"
      href="/hero.webp"
      fetchpriority="high"
      type="image/webp"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Sans+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Schema.org WebApplication: tells Google this is a free, browser-based
         pixel-art design tool. Eligible for rich results in search. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Tomodachi",
        "alternateName": "Tomodachi Studio",
        "url": "https://tomodachi.pw/",
        "description": "Browser-first Mii pixel-art studio paired with practical breach-recovery guides for Tomodachi Life players. Turn photos or character art into repaintable Mii face masks square-by-square, or pick up free guides for QR codes, gameplay basics, and breach recovery.",
        "applicationCategory": "DesignApplication",
        "applicationSubCategory": "Pixel Art Editor",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Modern browser (Chrome, Firefox, Safari, Edge).",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "category": "free"
        },
        "image": "https://tomodachi.pw/og-image.png",
        "screenshot": "https://tomodachi.pw/og-image.png",
        "featureList": [
          "Photo-to-pixel-art conversion",
          "84-color Tomodachi Life palette",
          "Paint-by-numbers reference export",
          "Color reduction optimizer",
          "Reference pack download",
          "Browser-only k-anonymity password breach check",
          "OpenRouter-backed AI recovery assistant"
        ],
        "publisher": {
          "@type": "Organization",
          "name": "Tomodachi",
          "url": "https://tomodachi.pw/",
          "logo": "https://tomodachi.pw/og-image.png",
          "sameAs": ["https://github.com/RazonIn4K", "https://tomodachi.brave"]
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT;
      const websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;

      if (endpoint && websiteId) {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${endpoint.replace(/\/$/, "")}/umami`;
        script.dataset.websiteId = websiteId;
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
