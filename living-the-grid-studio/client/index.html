    <link rel="preconnect" href="https://d2xsxph8kpxj0f.cloudfront.net" crossorigin />

      as="image"

    <!-- Schema.org WebApplication: tells Google this is a free, browser-based
         pixel-art design tool. Eligible for rich results in search. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Tomodachi",
      "alternateName": "Tomodachi Studio",
      "url": "https://tomodachi.pw/",
      "description": "Browser-first Mii pixel-art studio paired with practical breach-recovery guides for Tomodachi Life players. Turn photos or character art into repaintable Mii face masks square-by-square, or pick up free guides for QR codes, gameplay basics, and breach recovery.",

      "applicationSubCategory": "Pixel Art Editor",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript. Modern browser (Chrome, Firefox, Safari, Edge).",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "category": "free"
      },
      "image": "https://tomodachi.pw/og-image.png",
      "screenshot": "https://tomodachi.pw/og-image.png",
      "featureList": [
        "Photo-to-pixel-art conversion",
        "84-color Tomodachi Life palette",
        "Paint-by-numbers reference export",
        "Color reduction optimizer",
        "Reference pack download",
        "Browser-only k-anonymity password breach check",
        "OpenRouter-backed AI recovery assistant"
      ],
      "publisher": {
        "@type": "Organization",
        "name": "Tomodachi",
        "url": "https://tomodachi.pw/",
        "logo": "https://tomodachi.pw/og-image.png",
        "sameAs": [
          "https://github.com/RazonIn4K",
          "https://tomodachi.brave"
        ]
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT;
      const websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;

      if (endpoint && websiteId) {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${endpoint.replace(/\/$/, "")}/umami`;
        script.dataset.websiteId = websiteId;
        document.body.appendChild(script);
      }
    </script>
  </body>

</html>
